apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: dbinstances.database.example.org
spec:
  group: database.example.org
  names:
    kind: DbInstance
    plural: dbinstances
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - name
                - availabilityZone
                - flavor
                - size
              properties:
                name:
                  type: string
                availabilityZone:
                  type: string
                flavor:
                  type: string
                  enum:
                    - small
                    - large
                size:
                  type: integer
                  minimum: 40
